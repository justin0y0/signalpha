version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: earnings
      POSTGRES_USER: earnings
      POSTGRES_PASSWORD: earnings
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earnings -d earnings"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://earnings:earnings@postgres:5432/earnings
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  scheduler:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: ["python", "-m", "data_pipeline.scheduler"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://earnings:earnings@postgres:5432/earnings
      REDIS_URL: redis://redis:6379/0
      PYTHONPATH: /app
    volumes:
      - ./artifacts:/app/artifacts
      - ./data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
